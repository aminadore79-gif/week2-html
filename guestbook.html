<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guestbook - 방명록</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // 전역 감시자 변수 선언
        let observer;

        document.addEventListener("DOMContentLoaded", function() {
            // 1. 다크모드 설정 기억
            if (localStorage.getItem("myDarkMode") === "on") {
                document.body.classList.add("dark-theme");
            }

            // 2. ✨ 스크롤 감시자 설정
            const observerOptions = { threshold: 0.1 };
            observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, observerOptions);

            // 초기 정적 요소 감시 시작
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
            
            // 웹사이트 켜지면 저장된 데이터 불러오기
            loadGuestbook();
        });
    </script>
</head>

<body>
    <header class="portfolio-header">
        <div class="logo">🚀 My Portfolio</div>
        <nav class="pc-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="guestbook.html">Guestbook</a></li>
            </ul>
        </nav>
        <div class="hamburger" onclick="toggleMenu()">🍔</div>
    </header>

    <div class="mobile-menu" id="mobile-menu">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="guestbook.html">Guestbook</a></li>
        </ul>
    </div>

    <div style="max-width: 600px; margin: 0 auto; padding: 20px;">
        <div class="reveal">
            <h2 style="text-align: center; color: #2c3e50; margin-top: 40px;">📝 방문자 방명록</h2>
            <p style="text-align: center; color: #7f8c8d;">(현재는 내 PC에만 저장되는 임시 모드입니다! ☁️)</p>
        </div>
        
        <div class="reveal" style="background-color: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px;">
            <input type="text" id="gb-name" placeholder="이름 (닉네임)" style="width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px;">
            <textarea id="gb-message" placeholder="여기에 따뜻한 방명록을 남겨주세요!" rows="4" style="width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px;"></textarea>
            <button onclick="addGuestbook()" style="width: 100%; background-color: #27ae60; font-size: 18px; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer;">✍️ 방명록 남기기</button>
        </div>

        <hr style="margin: 30px 0;" class="reveal">

        <div id="guestbook-list"></div>
    </div>

    <script>
        let guestbookData = [];

        function loadGuestbook() {
            let savedData = localStorage.getItem("myGuestbook");
            if (savedData) {
                guestbookData = JSON.parse(savedData);
                renderGuestbook();
            }
        }

        function addGuestbook() {
            let nameInput = document.getElementById("gb-name").value;
            let msgInput = document.getElementById("gb-message").value;

            if(nameInput === "" || msgInput === "") {
                Swal.fire("앗!", "이름과 내용을 모두 적어주세요!", "warning");
                return;
            }

            let now = new Date();
            let timeString = now.getFullYear() + "-" + (now.getMonth()+1) + "-" + now.getDate() + " " + now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');

            let newEntry = { name: nameInput, message: msgInput, date: timeString };
            guestbookData.push(newEntry);
            localStorage.setItem("myGuestbook", JSON.stringify(guestbookData));
            
            document.getElementById("gb-name").value = "";
            document.getElementById("gb-message").value = "";
            
            renderGuestbook();
            Swal.fire("성공!", "방명록이 등록되었습니다! 🎉", "success");
        }

        function renderGuestbook() {
            let list = document.getElementById("guestbook-list");
            let currentName = document.getElementById("gb-name").value;
            list.innerHTML = "";
            
            for (let i = guestbookData.length - 1; i >= 0; i--) {
                let entry = guestbookData[i];
                let card = document.createElement("div");
                // 🌟 새 카드에 reveal 클래스 부여
                card.className = "gb-card reveal";
                
                let deleteBtn = "";
                if (currentName === "관리자") {
                    deleteBtn = `<button onclick="deleteEntry(${i})" style="float:right; background-color:#ff6b6b; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer; font-size:12px;">삭제</button>`;
                }

                card.innerHTML = `
                    ${deleteBtn}
                    <h4 style="margin: 0 0 10px 0; color: #2c3e50;">👤 ${entry.name} <span style="font-size: 12px; color: #999; font-weight: normal;">${entry.date}</span></h4>
                    <p style="margin: 0; color: #333; line-height: 1.5;">${entry.message}</p>
                `;
                list.appendChild(card);
                
                // 🌟 새로 생성된 카드를 감시 대상에 등록
                if(observer) observer.observe(card);
            }
        }

        function deleteEntry(index) {
            Swal.fire({
                title: '정말 삭제할까요?',
                text: "삭제된 글은 복구할 수 없습니다!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: '네, 삭제합니다!'
            }).then((result) => {
                if (result.isConfirmed) {
                    guestbookData.splice(index, 1);
                    localStorage.setItem("myGuestbook", JSON.stringify(guestbookData));
                    renderGuestbook();
                    Swal.fire('삭제 완료!', '방명록 글이 삭제되었습니다.', 'success');
                }
            })
        }

        document.getElementById("gb-name").addEventListener("input", renderGuestbook);

        function toggleMenu() {
            document.getElementById("mobile-menu").classList.toggle("active");
        }
    </script>
</body>
</html>
